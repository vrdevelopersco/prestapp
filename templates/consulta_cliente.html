<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Consulta tu Préstamo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    {% include '_theme.html' %}
</head>
<body>
<div class="auth-wrap">
    <div class="card auth-card" style="max-width: 450px;">
        <div class="card-body p-4 p-sm-5">
            <div class="text-center mb-4">
                <div class="auth-brand mb-3"><i class="bi bi-safe2-fill"></i></div>
                <h3 class="mb-1">Consulta tu Crédito</h3>
                <p class="text-muted mb-0">Ingresa tu número de cédula para ver el estado de tu cuenta.</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} d-flex align-items-center">
                            <i class="bi bi-exclamation-circle me-2"></i>{{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('ver_estado_prestamo') }}">
                <div class="mb-3">
                    <label for="cedula" class="form-label">Número de Cédula</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white text-muted"><i class="bi bi-person-vcard"></i></span>
                        <input type="text" class="form-control" id="cedula" name="cedula" required autofocus>
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-search me-2"></i>Consultar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
